version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: villaverde_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      
  # Base de datos
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: villaverde_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bot de whatsApp
  bot:
    build: .
    container_name: villaverde_bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_PATH=   # vacío para forzar modo cliente-servidor
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    volumes:
      # Persistencia de conversaciones y logs
      - ./data:/app/data
      # Documentos a indexar (solo lectura)
      - ./documents:/app/documents:ro
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 600s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qdrant_data:
  redis_data: